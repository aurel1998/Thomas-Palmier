# Nginx — thomaspalmier.fr (VPS IONOS 217.160.191.235, Rocky 9)
#
# Rocky 9 (RHEL) : copié automatiquement vers /etc/nginx/conf.d/ par setup-ionos-vps.sh
# Debian/Ubuntu  : /etc/nginx/sites-available/ + lien sites-enabled
#
# HTTPS : certbot --nginx -d thomaspalmier.fr -d www.thomaspalmier.fr

server {
    listen 80;
    server_name thomaspalmier.fr www.thomaspalmier.fr;

    client_max_body_size 64M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
